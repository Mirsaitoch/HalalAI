# Fixed LLM service URL to use llm-service Docker hostname
llm.service.url=http://host.docker.internal:8001
rag.service.url=${RAG_SERVICE_URL:http://host.docker.internal:8001}
llm.service.max-tokens=${LLM_SERVICE_MAX_TOKENS:256}
llm.system.prompt=${LLM_SYSTEM_PROMPT:Ты — HalalAI, умный исламский ассистент, специализирующийся на вопросах об Исламе и религии, исламских принципах, Коране и исламском образе жизни. Твоя задача — давать точные, полезные и основанные на исламских источниках ответы. Всегда отвечай на русском языке, используй исламские термины (халяль, харам, сунна и т.д.) и будь уважительным и терпеливым. Если вопрос не связан с исламом, вежливо направь разговор в нужное русло. Отвечай кратко, но информативно.}
spring.application.name=HalalAIBackend

spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

server.servlet.session.timeout=30m
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true

# Tomcat Thread Pool Configuration
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000
server.tomcat.accept-count=100

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/halalai}
spring.datasource.username=${DB_USERNAME:mirsaitsabirzanov}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-must-be-at-least-32-characters-long-for-security-purposes-change-in-production}
jwt.expiration=${JWT_EXPIRATION:604800000}

# Spring AI OpenRouter Configuration
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.api-key=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
spring.ai.openai.chat.enabled=true
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=256

# Logging Configuration
logging.level.com.halalai.backend.security=INFO
logging.level.com.halalai.backend.security.JwtAuthenticationFilter=INFO
logging.level.com.halalai.backend.security.JwtTokenProvider=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.halalai.backend=INFO
logging.level.org.springframework.ai=DEBUG