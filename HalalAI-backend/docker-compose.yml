services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: halalai
      POSTGRES_USER: ${DB_USERNAME:-halalai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-halalai}
      LOCAL_DB_USER: ${LOCAL_DB_USER:-mirsaitsabirzanov}
      LOCAL_DB_NAME: ${LOCAL_DB_NAME:-halalai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-halalai} -d halalai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - halalai-network

  llm-service:
    build:
      context: ./LLM-service
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - OPEN_ROUTER_KEY=${OPEN_ROUTER_KEY:-}
      - RAG_HOST=0.0.0.0
      - RAG_PORT=8000
      - RAG_LOG_LEVEL=${RAG_LOG_LEVEL:-INFO}
      - LLM_MODEL=${LLM_MODEL:-openrouter/auto}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-1000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - halalai-network

  backend:
    build:
      context: ./HalalAI-backend-main
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/halalai
      - DB_USERNAME=${DB_USERNAME:-halalai}
      - DB_PASSWORD=${DB_PASSWORD:-halalai}
      - RAG_SERVICE_URL=http://llm-service:8000
      - JWT_SECRET=${JWT_SECRET:-supersecretkey12345678901234567890change_in_prod}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-604800000}
    depends_on:
      postgres:
        condition: service_healthy
      llm-service:
        condition: service_healthy
    networks:
      - halalai-network

volumes:
  postgres_data:

networks:
  halalai-network:
    driver: bridge
